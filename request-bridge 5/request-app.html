    ? 'You\u2019re watching your live ReQuest Dungeon session \u2014 every rep is detected by the wearable bands.'
    : 'Your reps are detected by the wearable bands and drive the ReQuest Dungeon in real time.';
}

function bridgeConnect(manual){
  if(BRIDGE.ws && BRIDGE.ws.readyState<=1) return;
  let ws;
  try{ ws=new WebSocket(BRIDGE.http.replace('http','ws')+'/ws/browser'); }
  catch(e){ if(manual) toast('Companion not reachable — is bridge.py running?'); return; }
  ws.binaryType='blob'; BRIDGE.ws=ws; BRIDGE.decoding=false;
  ws.onopen=()=>{ BRIDGE.online=true; bridgeUI(); if(state.tab==='play') bridgePrefillRx(); };
  ws.onmessage=ev=>{
    if(ev.data instanceof Blob){
      const img=document.getElementById('liveFrame'); if(!img) return;
      const had=BRIDGE.frames; BRIDGE.frames=true;
      if(!had) bridgeUI();
      // drop frames if we're still showing the previous one — keeps it real-time, never backs up
      if(BRIDGE.decoding){ return; }
      BRIDGE.decoding=true;
      const url=URL.createObjectURL(ev.data);
      img.onload=img.onerror=()=>{ if(BRIDGE.frameURL) URL.revokeObjectURL(BRIDGE.frameURL); BRIDGE.frameURL=url; BRIDGE.decoding=false; };
      img.src=url;
    }else{
      try{
        const m=JSON.parse(ev.data);
        if(m.type==='status'){
          const wasRun=BRIDGE.status.running;
          BRIDGE.status=m;
          if(!m.streaming) BRIDGE.frames=false;
          if(wasRun!==m.running) bridgeUI(); else bridgeUI();
        }else if(m.type==='session'&&m.session){
          /* inputs are driven by the physio prescription on the web side */
        }else if(m.type==='result'&&m.result){
          // an enemy was defeated = one prescribed exercise completed
          const ex=m.result;
          BRIDGE.sessionXp=m.xp_session||((BRIDGE.sessionXp||0)+(ex.xp||0));
          BRIDGE.sessionDone=m.done_count||((BRIDGE.sessionDone||0)+1);
          state.player.xp=(state.player.xp||0)+(ex.xp||0);
          applySessionStats();
          if(window.toast) toast('Enemy defeated: '+(ex.exercise||'exercise')+' \u2014 +'+(ex.xp||0)+' XP',ic.check);
          fetchResults();
        }else if(m.type==='workout_done'){
          // every enemy defeated -> workout complete: +1 level
          const gain=m.level_gain||1, xp=m.xp_total||0, n=(m.exercises||[]).length;
          state.player.level=(state.player.level||1)+gain;
          state.player.workouts=(state.player.workouts||0)+1;
          state.lastWorkout={exercises:n, xp:xp, levelGain:gain, when:Date.now()};
          BRIDGE.sessionXp=0; BRIDGE.sessionDone=0;
          saveSnapshot(); applySessionStats(); fetchResults();
          if(window.toast) toast('Workout complete! +'+gain+' level · +'+xp+' XP',ic.check);
          if(state.persona==='patient'){ setTimeout(()=>go('report'), 1000); }
        }else if(m.type==='results'){
          BRIDGE.sessionXp=m.session_xp||0;
          renderSaved(m.results||[]); applySessionStats();
        }
      }catch(e){}
    }
  };
  ws.onclose=ws.onerror=()=>{
    const was=BRIDGE.online;
    BRIDGE.online=false; BRIDGE.frames=false; BRIDGE.ws=null;
    BRIDGE.status={configured:false,running:false,mirror:false,game:null};
    bridgeUI();
    if(manual&&!was) toast('Companion not reachable — is bridge.py running?');
    clearTimeout(BRIDGE.retryT);
    BRIDGE.retryT=setTimeout(()=>{ if(state.tab==='play') bridgeConnect(false); },4000);
  };
}

function bridgeSend(obj){ if(BRIDGE.ws&&BRIDGE.ws.readyState===1) BRIDGE.ws.send(JSON.stringify(obj)); }

async function bridgeLaunch(mirror){

    else toast(j.error||'Could not launch');

}

async function bridgePostSession(payload,silent){
  try{
    const r=await fetch(BRIDGE.http+'/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.ok&&!silent) toast('Sent to game: '+(payload.reps||'?')+' reps × '+(payload.sets||'?')+' sets',ic.check);
    return r.ok;
  }catch(e){ if(!silent) toast('Companion offline — start bridge.py first'); return false; }
}
/* the logged-in patient's prescription = the physio's "patient window".
   This is the source the game's reps/sets default to. */
function physioRx(){
  const p=PATIENTS.find(x=>x.id===1)||{rx:[]};
  return (p.rx||[]).map(r=>({key:r.key,name:(libEx(r.key).name||r.key),reps:r.reps,sets:r.sets||3}));
}
function rxOptions(){
  const list=physioRx();
  if(!list.length) return '<option>Band pull-apart</option>';
  return list.map((e,i)=>`<option value="${i}">${e.name} · ${e.reps}×${e.sets} (prescribed)</option>`).join('');
}
function bridgeSelectedRx(){
  const list=physioRx(); if(!list.length) return {name:'Band pull-apart',reps:12,sets:3};
  const sel=document.getElementById('brExercise');
  return list[Math.min(+(sel&&sel.value||0),list.length-1)];
}
/* fill reps/sets from the physio prescription for the chosen exercise,
   and push the FULL plan (with any override applied to the active exercise)
   so the game receives the whole session by default */
function bridgePrefillRx(){
  const e=bridgeSelectedRx();
  const r=document.getElementById('brReps'), s=document.getElementById('brSets');
  if(r) r.value=e.reps; if(s) s.value=e.sets;
  bridgePush(true);
}
const _overrides={};
function bridgePush(silent){
  const list=physioRx();
  if(!list.length){ bridgePostSession({plan:[{exercise:'Band pull-apart',reps:12,sets:3}],current:0,patient:state.player.name},silent); return; }
  const sel=document.getElementById('brExercise'); const idx=Math.min(+(sel&&sel.value||0),list.length-1);
  const reps=+(document.getElementById('brReps')||{}).value||list[idx].reps;
  const sets=+(document.getElementById('brSets')||{}).value||list[idx].sets;
  _overrides[idx]={reps,sets};
  const plan=list.map((e,i)=> _overrides[i] ? {exercise:e.name,reps:_overrides[i].reps,sets:_overrides[i].sets} : {exercise:e.name,reps:e.reps,sets:e.sets});
  bridgePostSession({plan, current:idx, exercise:plan[idx].exercise, reps, sets, patient:state.player.name}, silent);
}
function bridgeSendSession(){ bridgePush(false); }

function fmtAgo(ts){

  if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
}

/* clinician side: pushing an adjusted program also feeds the running game */
function pushRxBridge(pid){
  const p=PATIENTS.find(x=>x.id===pid);
  if(!p||!p.rx||!p.rx.length) return;
  const plan=p.rx.map(r=>({exercise:(libEx(r.key).name||r.key), reps:+r.reps, sets:+(r.sets||3)}));
  bridgePostSession({plan, current:0, exercise:plan[0].exercise, reps:plan[0].reps, sets:plan[0].sets, patient:p.name}, true);
}

/* the encounters list, fed from the prescription (no built-in game needed) */
function renderEncStatic(){
  const el=document.getElementById('encList'); if(!el) return;
  el.innerHTML = state.exercises.map((e,i)=>{
    const em={slime:'\u{1F7E2}',bat:'\u{1F987}',ogre:'\u{1F479}'}[e.enemy]||'\u2694\uFE0F';
    return `<div class="enc ${i===0?'cur':''}"><div class="ec" style="background:rgba(255,255,255,.08)">${em}</div>
      <div class="et"><div class="n">${e.name}</div><div class="r">${e.reps} reps \u00d7 ${e.sets||1} sets</div></div></div>`;
  }).join('');
}

/* optional: keys & clicks on the mirrored frame are forwarded (sensors still drive the game) */
window.addEventListener('keydown',e=>{
  if(!BRIDGE.frames||state.tab!=='play'||/INPUT|TEXTAREA/.test(e.target.tagName)) return;
  if(!e.repeat) bridgeSend({type:'keydown',key:e.key});
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>{
  if(!BRIDGE.frames||state.tab!=='play'||/INPUT|TEXTAREA/.test(e.target.tagName)) return;
  bridgeSend({type:'keyup',key:e.key});
});
document.addEventListener('mousedown',e=>{
  const img=document.getElementById('liveFrame');
  if(!BRIDGE.frames||!img||e.target!==img) return;
  const b=img.getBoundingClientRect();
  bridgeSend({type:'mousedown',x:(e.clientX-b.left)/b.width,y:(e.clientY-b.top)/b.height,button:1});
});

window.bridgeConnect=bridgeConnect; window.bridgeSendSession=bridgeSendSession; window.pushRxBridge=pushRxBridge;
window.bridgeLaunch=bridgeLaunch; window.bridgeStop=bridgeStop; window.bridgePrefillRx=bridgePrefillRx;

window.patSend=patSend; window.docSend=docSend; window.go=go; window.toast=toast;
window.updRange=updRange; window.setFeel=setFeel; window.saveReport=saveReport;
window.toggleLike=toggleLike; window.toggleCommentBox=toggleCommentBox; window.submitComment=submitComment;
window.setShareSession=setShareSession; window.setShareFeel=setShareFeel; window.postShare=postShare; window.sharePreview=sharePreview;
window.openRecords=openRecords; window.closeRecords=closeRecords; window.state=state;
window.ringInfo=ringInfo; window.openTutorial=openTutorial;
window.openAddPatient=openAddPatient; window.createPatient=createPatient;
window.openLibrary=openLibrary; window.addRx=addRx; window.removeRx=removeRx; window.setRx=setRx;
window.openAdjust=openAdjust; window.closeModalEl=closeModalEl;
window.openFeedback=openFeedback; window.sendFeedback=sendFeedback;
window.doLogin=doLogin; window.setLoginRole=setLoginRole; window.newSession=newSession;
window.openFriends=openFriends; window.addFriend=addFriend; window.acceptFriend=acceptFriend; window.declineFriend=declineFriend;
window.openGroups=openGroups; window.joinGroup=joinGroup; window.leaveGroup=leaveGroup; window.openGroup=openGroup;
window.calibrateBands=calibrateBands; window.openSettings=openSettings; window.toggleSetting=toggleSetting; window.openSchedule=openSchedule;

/* boot */
restoreIfRecording();
renderLogin();
full();
</script>
