<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReQuest — Game Therapy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ReQuest — design tokens
   ============================================================ */
:root{
  --violet:#5b4ad4;
  --violet-2:#6d5ce0;
  --violet-deep:#3d2fa8;
  --violet-ink:#241d52;
  --teal:#16c4ac;
  --teal-deep:#0e9e8b;
  --teal-soft:#d6f6f0;
  --bg:#eef1fc;
  --bg-2:#e6eafb;
  --card:#ffffff;
  --ink:#211f44;
  --muted:#8d8bb0;
  --line:#e7e8f5;
  --line-soft:#f0f1fa;
  --amber:#f5a623;
  --amber-soft:#fdf1da;
  --rose:#ef5d7a;
  --good:#16c4ac;
  --shadow:0 18px 40px -22px rgba(60,47,168,.45);
  --shadow-sm:0 6px 18px -12px rgba(60,47,168,.4);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
/* faint medical cross pattern */
.crosspattern{
  background-image:
    radial-gradient(circle at 1px 1px, rgba(91,74,212,.05) 0, rgba(91,74,212,.05) 1.5px, transparent 2px);
  background-size:26px 26px;
}
.cross-tex{
  position:relative;
}
.cross-tex::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.0),rgba(255,255,255,.0)),
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(91,74,212,.05) 22px 24px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(91,74,212,.05) 22px 24px);
  -webkit-mask:repeating-linear-gradient(0deg, #000 0 2px, transparent 2px 24px),
        repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 24px);
  mask:repeating-linear-gradient(0deg, #000 0 2px, transparent 2px 24px),
        repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 24px);
  opacity:.7;
}
h1,h2,h3,h4{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:-.01em;color:var(--violet-ink)}
::selection{background:rgba(91,74,212,.18)}

/* scrollbars */
.scroll::-webkit-scrollbar{width:9px;height:9px}
.scroll::-webkit-scrollbar-thumb{background:#d5d7ef;border-radius:20px;border:2px solid transparent;background-clip:content-box}
.scroll::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   App shell
   ============================================================ */
#app{height:100%;display:flex;flex-direction:column}
.topbar{
  height:62px;flex:0 0 62px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;
  justify-content:space-between;padding:0 22px;z-index:30;position:relative;
}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;display:grid;place-items:center;flex:0 0 36px}
.logo svg{width:36px;height:36px}
.brand .name{font-family:'Fredoka';font-weight:600;font-size:23px;color:var(--violet-deep);line-height:1}
.brand .name b{color:var(--teal-deep);font-weight:600}
.nav{display:flex;gap:4px;background:var(--bg-2);padding:5px;border-radius:14px}
.nav button{
  font-family:'Plus Jakarta Sans';font-weight:700;font-size:12.5px;color:var(--muted);
  border:0;background:transparent;padding:8px 13px;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:.18s;letter-spacing:.01em;white-space:nowrap;
}
.nav button svg{width:16px;height:16px}
.nav button:hover{color:var(--violet)}
.nav button.on{background:#fff;color:var(--violet-deep);box-shadow:var(--shadow-sm)}
.topbar-right{display:flex;align-items:center;gap:14px}
.bandchip{
  display:flex;align-items:center;gap:8px;background:var(--teal-soft);color:var(--teal-deep);
  font-weight:700;font-size:11.5px;padding:7px 12px;border-radius:11px;border:1px solid #b9eee5;
}
.bandchip .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(22,196,172,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,196,172,.55)}70%{box-shadow:0 0 0 7px rgba(22,196,172,0)}100%{box-shadow:0 0 0 0 rgba(22,196,172,0)}}
.persona{
  display:flex;align-items:center;gap:9px;cursor:pointer;border:1px solid var(--line);
  background:#fff;border-radius:12px;padding:5px 8px 5px 12px;transition:.15s
}
.persona:hover{border-color:#cfd2ee}
.persona .who{text-align:right;line-height:1.15}
.persona .who .n{font-weight:800;font-size:12px;color:var(--ink)}
.persona .who .r{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.avatar{width:34px;height:34px;border-radius:10px;background:var(--violet);display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Fredoka';font-size:15px;overflow:hidden;flex:0 0 34px}

.view{flex:1;overflow-y:auto;position:relative;z-index:1}
.wrap{max-width:1180px;margin:0 auto;padding:26px 24px 60px}

/* ============================================================
   Generic cards / bits
   ============================================================ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.pad{padding:20px}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:4px 9px;border-radius:8px}
.tag.violet{background:#ece9fb;color:var(--violet-deep)}
.tag.teal{background:var(--teal-soft);color:var(--teal-deep)}
.tag.amber{background:var(--amber-soft);color:#b9760a}
.tag.gray{background:#f1f1f8;color:var(--muted)}
.muted{color:var(--muted)}
.eyebrow{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.13em;color:var(--muted)}
.sectitle{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--violet-ink);display:flex;align-items:center;gap:8px}
.btn{font-family:'Plus Jakarta Sans';font-weight:800;font-size:13px;border:0;cursor:pointer;border-radius:12px;padding:11px 18px;display:inline-flex;align-items:center;gap:8px;transition:.16s}
.btn svg{width:16px;height:16px}
.btn.primary{background:var(--violet);color:#fff;box-shadow:0 12px 24px -12px rgba(91,74,212,.8)}
.btn.primary:hover{background:var(--violet-deep);transform:translateY(-1px)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:#cfd2ee}
.btn.teal{background:var(--teal);color:#fff}
.btn.teal:hover{background:var(--teal-deep)}
.row{display:flex;gap:18px}
.grid{display:grid;gap:18px}

/* progress bar */
.bar{height:9px;background:#eef0f9;border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:99px;background:var(--teal)}

/* ============================================================
   HOME
   ============================================================ */
.home-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:22px}
.home-head h1{font-size:32px;margin:6px 0 4px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat .lab{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.stat .val{font-family:'Fredoka';font-size:30px;font-weight:600;color:var(--violet-ink);line-height:1.05}
.stat .val small{font-size:13px;color:var(--muted);font-weight:600;font-family:'Plus Jakarta Sans'}
.icbox{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:#ece9fb;color:var(--violet)}
.icbox.teal{background:var(--teal-soft);color:var(--teal-deep)}
.trend{font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:3px}
.trend.up{color:var(--teal-deep)} .trend.down{color:var(--rose)}

.quest-card{
  background:linear-gradient(135deg,var(--violet) 0%,var(--violet-deep) 100%);
  color:#fff;border-radius:22px;padding:24px;position:relative;overflow:hidden;border:0;
  box-shadow:0 24px 50px -24px rgba(61,47,168,.9)
}
.quest-card .blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.07)}
.quest-card h2{color:#fff;font-size:25px;line-height:1.05;margin:14px 0 6px}
.dmg-pill{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:7px 11px;font-size:11px;font-weight:800}

.milestone{display:flex;flex-direction:column;gap:8px}
.mile-head{display:flex;justify-content:space-between;align-items:center}
.mile-dot{width:9px;height:9px;border-radius:50%}

.chat-msg{max-width:88%;font-size:13px;line-height:1.5;padding:10px 13px;border-radius:14px}
.chat-msg.them{background:#f1f1f8;border-top-left-radius:4px;align-self:flex-start;color:#3a3860}
.chat-msg.me{background:var(--violet);color:#fff;border-top-right-radius:4px;align-self:flex-end}
.chat-time{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}

.resource{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1px solid var(--line-soft);border-radius:13px;cursor:pointer;transition:.15s}
.resource:hover{border-color:#cfeee6;background:#f6fdfb}

/* ============================================================
   JOURNEY (Strava / WHOOP)
   ============================================================ */
.ring-wrap{display:flex;gap:14px;align-items:flex-start;justify-content:space-around;flex-wrap:wrap}
.ring{position:relative;width:138px;display:flex;flex-direction:column;align-items:center;gap:11px;background:none;border:0;padding:0;cursor:pointer;font-family:inherit}
.ring .ringsvg{position:relative;width:138px;height:138px}
.ring .ringsvg svg{transform:rotate(-90deg)}
.ring .rc{position:absolute;inset:0;display:grid;place-items:center}
.ring .num{font-family:'Plus Jakarta Sans';font-weight:800;font-size:42px;line-height:1;color:var(--violet-ink);letter-spacing:-.025em}
.ring .num .suf{font-size:18px;font-weight:700;margin-left:1px}
.ring .rlab{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);transition:.15s}
.ring .rlab svg{width:13px;height:13px}
.ring:hover .rlab{color:var(--violet)}
.ring:hover .ringsvg{transform:scale(1.02);transition:.15s}

.feed-item{display:flex;gap:14px;padding:18px 0;border-bottom:1px solid var(--line-soft)}
.feed-item:last-child{border-bottom:0}
.feed-ava{width:44px;height:44px;border-radius:13px;flex:0 0 44px;display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Fredoka';font-size:16px}
.feed-metrics{display:flex;gap:26px;margin:12px 0 10px;flex-wrap:wrap}
.feed-metrics .m .v{font-family:'Fredoka';font-size:19px;font-weight:600;color:var(--violet-ink)}
.feed-metrics .m .k{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.kudos{display:flex;align-items:center;gap:18px;font-size:12px;font-weight:700;color:var(--muted)}
.kudos button{border:0;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--muted);font-weight:700;font-size:12px;font-family:inherit;transition:.15s}
.kudos button:hover{color:var(--violet)}
.kudos button.kud-on{color:var(--rose)}

/* self-report check-in */
.rep-row{display:flex;flex-direction:column;gap:14px}
.rep-lab{display:flex;justify-content:space-between;align-items:center}
.rep-val{font-family:'Fredoka';font-weight:600;font-size:18px}
.rep-scale{display:flex;justify-content:space-between;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:10px;border-radius:6px;background:#e9e9f4;outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--violet);box-shadow:var(--shadow-sm);cursor:pointer}
.slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--violet);box-shadow:var(--shadow-sm);cursor:pointer}
.slider.rose{background:linear-gradient(90deg,#ffe1e8,#ffc4d2)}
.slider.rose::-webkit-slider-thumb{border-color:var(--rose)} .slider.rose::-moz-range-thumb{border-color:var(--rose)}
.slider.amber{background:linear-gradient(90deg,#fdeccd,#f7d79a)}
.slider.amber::-webkit-slider-thumb{border-color:var(--amber)} .slider.amber::-moz-range-thumb{border-color:var(--amber)}
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;color:var(--ink);background:var(--bg);border:1.5px solid var(--line);padding:10px 16px;border-radius:12px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--violet);color:var(--violet)}
.chip.on{background:var(--violet);border-color:var(--violet);color:#fff}
.note{width:100%;min-height:96px;resize:vertical;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-family:'Plus Jakarta Sans';font-size:13.5px;color:var(--ink);background:var(--bg);outline:none;line-height:1.5;box-sizing:border-box}
.note:focus{border-color:var(--violet);background:#fff}

/* feed cards + cheer/comment system */
.feed-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:18px 20px;transition:.18s}
.feed-card:hover{box-shadow:0 10px 28px rgba(36,29,82,.1);border-color:#dcdcef}
.feed-head{display:flex;gap:13px;align-items:center}
.feed-actions{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft)}
.act-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--muted);font-weight:700;font-size:12.5px;font-family:inherit;padding:8px 14px;border-radius:11px;cursor:pointer;transition:.15s}
.act-btn:hover{border-color:var(--violet);color:var(--violet)}
.act-btn svg{width:16px;height:16px}
.act-btn.liked{background:#ffeef3;border-color:#ffc4d2;color:var(--rose)}
.act-btn.liked svg{fill:var(--rose)}
.comments{display:flex;flex-direction:column;gap:9px;margin-top:13px}
.comments:empty{margin-top:0}
.comment{display:flex;gap:9px;align-items:flex-start}
.comment .cava{width:28px;height:28px;border-radius:8px;flex:0 0 28px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;font-family:'Fredoka'}
.comment .cbody{background:var(--bg);border-radius:10px;padding:8px 12px;flex:1}
.comment .cbody .cw{font-weight:800;font-size:11.5px;color:var(--ink)}
.comment .cbody .ct{font-size:12.5px;color:#5a5878;margin-top:1px;line-height:1.4}
.cbox{margin-top:12px;display:none;gap:9px}
.cbox.open{display:flex}
.cbox input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:9px 13px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--bg);outline:none}
.cbox input:focus{border-color:var(--violet);background:#fff}
.cbox button{border:0;background:var(--violet);color:#fff;font-weight:700;font-size:12.5px;font-family:inherit;padding:0 18px;border-radius:11px;cursor:pointer}

/* share composer */
.sess{text-align:left;width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;font-family:inherit;transition:.15s}
.sess:hover{border-color:var(--violet)}
.sess.on{border-color:var(--violet);background:#f3f1fe;box-shadow:0 0 0 3px rgba(91,74,212,.12)}

/* AI performance coach */
.ai-card{background:linear-gradient(135deg,#f3f1fe 0%,#eaf8f5 100%);border-color:#d9d4f7}
.ai-orb{width:42px;height:42px;border-radius:13px;flex:0 0 42px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--violet) 0%,var(--teal) 100%);box-shadow:0 4px 12px rgba(91,74,212,.32)}
.ai-orb svg{width:21px;height:21px}

/* clinical records modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(36,29,82,.45);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;padding:24px;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:22px;max-width:720px;width:100%;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(36,29,82,.4);overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 24px;border-bottom:1px solid var(--line)}
.modal-x{border:0;background:var(--bg);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--muted);flex:0 0 34px}
.modal-x:hover{background:#ececf6;color:var(--ink)}
.modal-body{padding:22px 24px;overflow-y:auto}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px 22px}
.rec-sec{margin-top:22px;padding-top:20px;border-top:1px solid var(--line-soft)}
.rec-li{font-size:13px;color:var(--ink);padding:5px 0;font-weight:500}
.rec-tl{display:flex;gap:14px;padding:9px 0 9px 14px;border-left:2px solid #e4e3f2;margin-left:6px}
.rec-tl-d{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--violet);flex:0 0 56px}
.rec-tl-n{font-size:12.5px;color:var(--muted);line-height:1.45}

/* prescription management */
.rx-empty{font-size:12.5px;color:var(--muted);line-height:1.55;background:var(--bg);border:1px dashed var(--line);border-radius:12px;padding:14px}
.rx-x{border:0;background:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:800;line-height:1;padding:4px 6px;border-radius:8px;transition:.15s}
.rx-x:hover{background:#ffeef3;color:var(--rose)}
.rx-x.wide{font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.rx-adjust{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:var(--bg);color:var(--violet);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;padding:7px 12px;border-radius:10px;font-family:inherit;transition:.15s}
.rx-adjust:hover{border-color:var(--violet);background:#ece9fb}
.rx-adjust svg{width:13px;height:13px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line)}
.modal-input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg);outline:none;box-sizing:border-box}
.modal-input:focus{border-color:var(--violet);background:#fff}
.lib-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.lib-row:last-child{border-bottom:0}
.adj-ex{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.adj-row{margin-top:12px}
.adj-lab{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.adj-val{font-family:'Fredoka';font-weight:600;font-size:16px;color:var(--violet-ink)}

/* game hero stats card */
.gp-hero{background:linear-gradient(160deg,rgba(123,108,224,.34),rgba(22,196,172,.12));border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:18px;color:#fff}
.gp-hero-top{display:flex;align-items:center;gap:13px}
.gp-ava{position:relative;width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#7b6ce0,#16c4ac);display:grid;place-items:center;font-family:'Fredoka';font-weight:600;font-size:20px;color:#fff;flex:0 0 48px}
.gp-lvl{position:absolute;bottom:-7px;right:-7px;background:#ffd86b;color:#3d2fa8;font-family:'Fredoka';font-weight:600;font-size:11px;min-width:21px;height:21px;border-radius:7px;display:grid;place-items:center;border:2px solid #2a2350;padding:0 3px}
.gp-name{font-family:'Fredoka';font-weight:600;font-size:17px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gp-title{font-size:11px;color:#bfbae6;font-weight:700;margin-top:2px}
.gp-streak{display:flex;align-items:center;gap:5px;background:rgba(255,216,107,.16);color:#ffd86b;padding:6px 11px;border-radius:11px;font-family:'Fredoka';font-weight:600;flex:0 0 auto}
.gp-streak svg{width:15px;height:15px}
.gp-hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.gp-hero-stats>div{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:9px 5px;text-align:center}
.gp-hero-stats .hv{font-family:'Fredoka';font-weight:600;font-size:17px;color:#fff}
.gp-hero-stats .hk{font-size:8.5px;color:#aaa6cf;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* exercise tutorials */
.tut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:18px}
.tut-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm)}
.tut-stage{background:#eef1fb;display:block}
.tut-svg{display:block;width:100%;height:auto}
.tut-info{padding:15px 17px}

/* new-session button */
.newsess{border:1.5px solid var(--line);background:var(--bg);color:var(--muted);font-family:inherit;font-weight:700;font-size:11.5px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.newsess:hover{border-color:var(--violet);color:var(--violet)}

/* login screen */
.login-screen{position:fixed;inset:0;z-index:200;display:grid;place-items:center;padding:24px;background:linear-gradient(155deg,#ece9fb 0%,#e6f6f3 100%);overflow:auto}
body.authed .login-screen{display:none}
.login-card{background:#fff;border-radius:26px;max-width:420px;width:100%;padding:38px 34px;box-shadow:0 30px 80px rgba(36,29,82,.22);text-align:center}
.login-logo{width:62px;height:62px;margin:0 auto 18px}
.login-logo svg{width:100%;height:100%}
.login-card h1{font-family:'Fredoka';font-weight:600;font-size:27px;color:var(--violet-ink)}
.login-card p{color:var(--muted);font-size:13.5px;line-height:1.55;margin:8px 0 20px}
.role-pick{display:flex;gap:10px;margin:14px 0 18px}
.role{flex:1;border:1.5px solid var(--line);background:var(--bg);border-radius:13px;padding:13px 8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:7px;transition:.15s}
.role svg{width:20px;height:20px}
.role:hover{border-color:var(--violet)}
.role.on{border-color:var(--violet);background:#f3f1fe;color:var(--violet)}
.login-go{width:100%;justify-content:center}
.login-note{font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}

/* Enter the Dungeon — full-width animated quest banner */
.dungeon-banner{position:relative;border-radius:22px;padding:3px;cursor:pointer;
  background:linear-gradient(120deg,#7b6ce0,#16c4ac,#f5a623,#ef5d7a,#7b6ce0);
  background-size:300% 300%;
  animation:dbFlow 7s ease infinite, dbGlow 2.8s ease-in-out infinite;
  transition:transform .15s ease}
.dungeon-banner:hover{transform:translateY(-2px)}
.dungeon-banner:active{transform:translateY(0)}
@keyframes dbFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dbGlow{0%,100%{box-shadow:0 10px 34px -10px rgba(123,108,224,.55)}50%{box-shadow:0 14px 50px -8px rgba(22,196,172,.6)}}
.db-inner{position:relative;border-radius:19px;overflow:hidden;
  background:radial-gradient(130% 150% at 82% -30%,#3a2f7a 0%,#241d52 55%,#1b1540 100%);
  padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.db-blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.db-shimmer{position:absolute;top:0;left:-60%;width:45%;height:100%;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.16),transparent);
  transform:skewX(-18deg);animation:dbShine 4s ease-in-out infinite}
@keyframes dbShine{0%{left:-60%}55%{left:135%}100%{left:135%}}
.db-left{position:relative;display:flex;align-items:center;gap:18px;min-width:0}
.db-ic{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.15);display:grid;place-items:center;color:#fff;flex:0 0 52px}
.db-ic svg{width:26px;height:26px}
.db-eyebrow{color:#bdb6ec;font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.db-title{color:#fff;font-family:'Fredoka';font-weight:600;font-size:27px;line-height:1.05;margin:3px 0 5px}
.db-sub{color:#cfcaef;font-size:12.5px;font-weight:600}
.db-right{position:relative;display:flex;align-items:center;gap:18px}
.db-encs{display:flex;gap:7px}
.db-enc{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;font-size:18px}
.db-enc:nth-child(1){animation:dbBob 1.8s ease-in-out infinite}
.db-enc:nth-child(2){animation:dbBob 1.8s ease-in-out .25s infinite}
.db-enc:nth-child(3){animation:dbBob 1.8s ease-in-out .5s infinite}
@keyframes dbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.db-cta{display:flex;align-items:center;gap:11px}
.db-cta>span{color:#fff;font-weight:800;font-size:12px;letter-spacing:.03em;opacity:.9}
.db-go{width:54px;height:54px;border-radius:15px;background:#fff;color:var(--violet);display:grid;place-items:center;animation:dbPulse 1.7s ease-in-out infinite}
.db-go svg{width:24px;height:24px}
@keyframes dbPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.55)}70%{transform:scale(1.07);box-shadow:0 0 0 12px rgba(255,255,255,0)}}
@media(max-width:560px){.db-encs{display:none}.db-cta>span{display:none}}

/* social: friends + groups */
.req-dot{background:var(--rose);color:#fff;border-radius:8px;padding:0 5px;font-size:10px;font-weight:800;margin-left:2px}
.soc-row{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-soft)}
.soc-row:last-child{border-bottom:0}
.grp-row{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--line-soft)}
.grp-row:last-child{border-bottom:0}
.grp-emoji{width:46px;height:46px;border-radius:13px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;font-size:23px;flex:0 0 46px}

/* band calibration (game side panel) */
.cal-status{font-size:11px;font-weight:800;color:#8fe6c4;display:inline-flex;align-items:center;gap:4px}
.cal-status svg{width:13px;height:13px}
.cal-bands{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.cal-band{display:flex;align-items:center;gap:9px;font-size:12px;color:#cfc9ef}
.cal-band b{margin-left:auto;font-family:'Fredoka';font-weight:500;color:#fff;font-size:12px}
.cal-dot{width:9px;height:9px;border-radius:50%;background:#5fd6a8;box-shadow:0 0 0 3px rgba(95,214,168,.18)}
.cal-rom{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:10px 13px;color:#cfc9ef;font-size:12px;font-weight:700}
.cal-rom b{font-family:'Fredoka';font-weight:600;font-size:18px;color:#8fe6c4}
.cal-bar{height:8px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;margin-top:12px}
.cal-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#7b6ce0,#16c4ac);border-radius:6px;transition:width .12s linear}
.cal-btn{width:100%;justify-content:center;margin-top:12px;background:rgba(255,255,255,.06)!important;border-color:rgba(255,255,255,.16)!important;color:#cfc9ef!important}
.cal-hint{font-size:10.5px;color:#9b96c4;line-height:1.5;margin-top:10px}

/* calendar / schedule */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
.cal-head span{text-align:center;font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
.cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cell{aspect-ratio:1;border-radius:13px;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative}
.cell .dn{font-family:'Fredoka';font-weight:500;font-size:15px;color:var(--ink)}
.cell.empty{border:0;background:none}
.cell.done{background:var(--teal-soft);border-color:#a6ece0}
.cell.done .dn{color:var(--teal-deep)}
.cell.rest{background:var(--bg);border-style:dashed}
.cell.rest .dn{color:var(--muted)}
.cell.upcoming{background:#f3f1fe;border-color:#dcd6fb}
.cell.upcoming .dn{color:var(--violet)}
.cell.today{outline:2.5px solid var(--violet);outline-offset:1px}
.cell .cmark{font-size:11px;line-height:1}
.cell .cmark svg{width:13px;height:13px}
.cal-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:18px}
.cal-legend span{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--muted)}
.lg-sw{width:15px;height:15px;border-radius:5px;border:1px solid var(--line)}

/* compact weekly schedule strip + streak chip */
.streak-chip{display:inline-flex;align-items:center;gap:5px;background:var(--amber-soft);color:#b9760a;font-family:'Fredoka';font-weight:600;font-size:14px;padding:4px 11px;border-radius:11px}
.streak-chip svg{width:14px;height:14px}
.lnk{border:0;background:none;color:var(--violet);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:3px;padding:0}
.lnk svg{width:12px;height:12px}
.wk-strip{display:flex;justify-content:space-between;gap:6px}
.wk-day{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.wk-l{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase}
.wk-pill{width:100%;max-width:36px;aspect-ratio:1;border-radius:9px;display:grid;place-items:center;border:1px solid var(--line);background:var(--bg)}
.wk-pill svg{width:14px;height:14px}
.wk-pill.done{background:var(--teal-soft);border-color:#a6ece0;color:var(--teal-deep)}
.wk-pill.miss{background:#fdecef;border-color:#f6c4cf;color:var(--rose);font-weight:800;font-size:12px}
.wk-pill.rest{border-style:dashed;color:var(--muted)}
.wk-pill.up{background:#f3f1fe;border-color:#dcd6fb}
.wk-pill.tnow{outline:2.5px solid var(--violet);outline-offset:1px}

/* physio header + bigger metrics */
.clinic-head{display:flex;justify-content:space-between;align-items:center;gap:22px;flex-wrap:wrap}
.ch-week{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 18px;min-width:248px;box-shadow:var(--shadow-sm)}
.ch-week-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;gap:14px}
.cmet{padding:22px 22px 20px;display:flex;flex-direction:column;justify-content:center}
.cmet-v{font-family:'Fredoka';font-weight:600;font-size:34px;line-height:1.05;margin-top:6px}
@media(max-width:880px){.ch-week{order:3;width:100%}}

/* prominent consistency hero (clinician) */
.icbox svg{width:20px;height:20px}
.sectitle svg{width:14px;height:14px}
.consis-hero{display:flex;align-items:center;gap:34px;padding:24px 28px;flex-wrap:wrap;margin-top:24px;background:linear-gradient(120deg,#ffffff,#f2fbf8);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.consis-left{flex:0 0 auto;min-width:166px}
.consis-pct{font-family:'Fredoka';font-weight:600;font-size:48px;line-height:1;margin:6px 0 9px}
.consis-pct small{font-size:23px;font-weight:600}
.consis-week{flex:1;min-width:320px}
.consis-week .wk-strip{gap:10px}
.consis-week .wk-l{font-size:12px;margin-bottom:3px;color:var(--muted)}
.consis-week .wk-pill{max-width:64px;border-radius:14px}
.consis-week .wk-pill svg{width:22px;height:22px}
.consis-week .wk-pill.miss{font-size:18px}
.metric3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:760px){.consis-hero{gap:20px}.consis-week{min-width:100%}.metric3{grid-template-columns:1fr}}

/* settings + accessibility */
.gearbtn{border:1.5px solid var(--line);background:var(--bg);color:var(--muted);width:38px;height:38px;border-radius:11px;cursor:pointer;display:grid;place-items:center;transition:.15s}
.gearbtn:hover{border-color:var(--violet);color:var(--violet)}
.gearbtn svg{width:17px;height:17px}
.set-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line-soft)}
.set-row:last-child{border-bottom:0}
.switch{margin-left:auto;width:46px;height:27px;border-radius:14px;background:var(--line);position:relative;cursor:pointer;transition:.18s;flex:0 0 46px;border:0}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--violet)}
.switch.on i{left:22px}
body.large-text{zoom:1.09}
body.reduce-motion *{animation:none!important;transition:none!important}

/* condition / care card */
.cond-row{display:flex;gap:11px;align-items:flex-start}
.cond-row > svg{width:17px;height:17px;color:var(--teal-deep);flex:0 0 17px;margin-top:1px}

/* workout / tutorials page */
.wkt-summary{display:flex;gap:34px;flex-wrap:wrap;align-items:center}
.wkt-summary .s .v{font-family:'Fredoka';font-weight:600;font-size:24px;color:var(--violet-ink);line-height:1}
.wkt-summary .s .k{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:4px}
.wkt{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm);text-align:left;font-family:inherit;width:100%}
.wkt:hover{border-color:var(--violet);box-shadow:0 12px 30px rgba(36,29,82,.11);transform:translateY(-1px)}
.wkt-idx{width:42px;height:42px;border-radius:13px;flex:0 0 42px;display:grid;place-items:center;font-family:'Fredoka';font-weight:600;font-size:19px;color:var(--violet-deep);background:#ece9fb}
.wkt-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;font-weight:700;color:var(--muted)}
.wkt-meta span{display:inline-flex;align-items:center;gap:6px}
.wkt-meta svg{width:14px;height:14px}
.wkt-cta{display:flex;align-items:center;gap:12px;flex:0 0 auto}
.wkt-tut{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;color:var(--violet);background:#ece9fb;padding:8px 13px;border-radius:10px;white-space:nowrap}
.wkt-tut svg{width:14px;height:14px}
.minibars{display:flex;align-items:flex-end;gap:7px;height:90px}
.minibars .b{flex:1;background:linear-gradient(var(--teal),#7fe6d6);border-radius:7px 7px 3px 3px;min-height:6px;transition:.4s}
.minibars .b.dim{background:#e7e8f5}
.pr{display:flex;align-items:center;gap:12px;padding:13px;border-radius:13px;background:#faf9ff;border:1px solid var(--line-soft)}
.medal{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,#ffd86b,#f5a623);color:#7a4d00;flex:0 0 38px}
.streakgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.streakgrid .d{aspect-ratio:1;border-radius:9px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#bdbcdb;border:1px solid var(--line-soft)}
.streakgrid .d.on{background:var(--teal-soft);border-color:#a6ece0;color:var(--teal-deep)}
.streakgrid .d.today{outline:2px solid var(--violet);outline-offset:1px}

/* ============================================================
   PLAY (game)
   ============================================================ */
#play-view{background:radial-gradient(120% 120% at 50% -10%, #2a2350 0%, #181436 55%, #110d28 100%);}
.play-wrap{max-width:1180px;margin:0 auto;padding:22px 24px 40px;display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:start}
.game-shell{position:relative}
.laptop{background:var(--violet);border-radius:24px;padding:16px;box-shadow:0 40px 80px -30px rgba(0,0,0,.7)}
.screen{background:#0e0a24;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:16/10}
#game{display:block;width:100%;height:100%;image-rendering:pixelated}
/* live pygame mirror */
#liveFrame{display:none;width:100%;height:100%;object-fit:contain;background:#0e0a24}
.screen.live #liveFrame{display:block}
.screen.live #game{display:none}
.live-badge{position:absolute;top:10px;left:10px;z-index:6;display:none;align-items:center;gap:6px;
  font-family:'Press Start 2P';font-size:8px;color:#fff;background:rgba(220,80,110,.92);
  padding:6px 9px;border-radius:7px;letter-spacing:.06em}
.screen.live .live-badge{display:inline-flex}
.live-badge i{width:7px;height:7px;border-radius:99px;background:#fff;animation:blink 1.1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.bridge-dot{width:9px;height:9px;border-radius:99px;background:#6b668f;flex:0 0 9px}
.bridge-dot.on{background:#16c4ac;box-shadow:0 0 0 4px rgba(22,196,172,.18)}
.bridge-row{display:flex;gap:9px;margin-top:11px}
.bridge-row .bfield{flex:1}
.bridge-row label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:#aaa6cf;margin-bottom:5px}
.bridge-row input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
  border-radius:10px;color:#fff;font-family:'Fredoka';font-weight:600;font-size:16px;padding:9px 11px;outline:none}
.bridge-row input:focus{border-color:var(--teal)}
.laptop .base{height:14px;background:#15a892;border-radius:0 0 26px 26px;margin:8px -10px -10px;}
.screen-overlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:5;
  background:rgba(8,6,22,.78);backdrop-filter:blur(2px);transition:.3s;padding:24px}
.screen-overlay.hide{opacity:0;pointer-events:none}
.screen-overlay h2{color:#fff;font-family:'Press Start 2P';font-size:18px;line-height:1.6;margin-bottom:14px;text-shadow:3px 3px 0 #000}
.screen-overlay p{color:#cfc9ef;font-size:13px;max-width:380px;margin:0 auto 18px;line-height:1.6}
.pixbtn{font-family:'Press Start 2P';font-size:12px;color:#fff;background:var(--teal);border:0;
  padding:14px 20px;border-radius:6px;cursor:pointer;box-shadow:0 5px 0 var(--teal-deep);transition:.08s}
.pixbtn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--teal-deep)}
.pixbtn.violet{background:var(--violet-2);box-shadow:0 5px 0 var(--violet-deep)}

/* stretch control */
.stretch-dock{margin-top:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:18px;backdrop-filter:blur(6px)}
.stretchbtn{flex:1;font-family:'Fredoka';font-weight:600;font-size:17px;color:#fff;
  background:linear-gradient(180deg,var(--teal),var(--teal-deep));border:0;border-radius:14px;
  padding:18px;cursor:pointer;user-select:none;box-shadow:0 8px 0 #0a8073;transition:.07s;letter-spacing:.02em;
  display:flex;align-items:center;justify-content:center;gap:10px;touch-action:none}
.stretchbtn:active,.stretchbtn.held{transform:translateY(5px);box-shadow:0 3px 0 #0a8073;filter:brightness(1.08)}
.stretch-hint{color:#b7b2dd;font-size:12px;max-width:170px;line-height:1.45}
.stretch-hint b{color:#fff}

/* play side panel */
.gp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;color:#e9e6fb}
.gp-card h3{color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:.1em}
.gp-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}
.gp-stat:last-child{border-bottom:0}
.gp-stat b{font-family:'Fredoka';font-weight:600;font-size:16px;color:#fff}
.enc-list .enc{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;margin-bottom:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.enc.done{opacity:.45}
.enc.cur{border-color:var(--teal);background:rgba(22,196,172,.12)}
.enc .ec{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 30px;font-size:15px}
.enc .et{flex:1;line-height:1.25}
.enc .et .n{font-weight:800;font-size:12.5px;color:#fff}
.enc .et .r{font-size:10.5px;color:#aaa6cf;font-weight:700}
.xpbar{height:11px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
.xpbar>i{display:block;height:100%;background:linear-gradient(90deg,#ffd86b,#f5a623);border-radius:99px;transition:.5s}

/* ============================================================
   CLINIC
   ============================================================ */
.clinic{display:grid;grid-template-columns:296px 1fr;gap:0;height:100%}
.caseload{background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.caseload .top{padding:18px;border-bottom:1px solid var(--line-soft)}
.search{position:relative}
.search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:9px 12px 9px 34px;font-family:inherit;font-size:13px;background:var(--bg)}
.search input:focus{outline:0;border-color:var(--violet);background:#fff}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
.patient{padding:13px;border-radius:14px;cursor:pointer;border:1px solid transparent;transition:.14s;margin-bottom:6px}
.patient:hover{background:var(--bg)}
.patient.on{background:#f3f1fd;border-color:#ddd7f7}
.pat-row{display:flex;gap:11px;align-items:center}
.pat-ava{width:40px;height:40px;border-radius:11px;flex:0 0 40px;display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Fredoka';font-size:15px;position:relative}
.pat-ava .warn{position:absolute;top:-3px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--amber);border:2.5px solid #fff}
.clinic-main{overflow-y:auto}
.metric4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.exercise{padding:14px;border-radius:14px;border:1px solid var(--line);cursor:pointer;transition:.15s;margin-bottom:10px}
.exercise.on{border-color:#bfe8e0;background:#f4fdfb}
.exercise.off{opacity:.55}
.exercise .ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.checkc{width:20px;height:20px;border-radius:50%;border:1.5px solid #cfd0e6;display:grid;place-items:center;flex:0 0 20px}
.checkc.on{background:var(--teal);border-color:var(--teal);color:#fff}

.float-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--violet-ink);color:#fff;padding:13px 20px;border-radius:14px;font-weight:700;font-size:13px;
  box-shadow:0 20px 40px -16px rgba(0,0,0,.5);z-index:80;opacity:0;transition:.3s;display:flex;align-items:center;gap:10px}
.float-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media (max-width:1080px){
  .play-wrap{grid-template-columns:1fr}
  .col-8,.col-4{grid-column:1/-1 !important}
}
.hidden{display:none !important}

  document.getElementById('nav').innerHTML = tabs.map(([k,l,i])=>
    `<button class="${state.tab===k?'on':''}" data-tab="${k}">${i}${l}</button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.tab));
}
function renderTopRight(){
  const band = `<div class="bandchip"><span class="dot"></span>Band paired ${ic.battery}<span style="font-size:10px">86%</span></div>`;

  const gear = `<button class="gearbtn" title="Settings &amp; accessibility" onclick="openSettings()">${ic.activity}</button>`;
  if(state.persona==='patient'){
    document.getElementById('topRight').innerHTML = band + reset + gear +
      `<div class="persona" id="togglePersona"><div class="who"><div class="n">${state.player.name}</div><div class="r">Patient · Lvl ${state.player.level}</div></div><div class="avatar">${(state.player.name[0]||'M').toUpperCase()}</div></div>`;

  state.persona = state.persona==='patient' ? 'physio':'patient';

  if(state.tab==='home') view.innerHTML = Home();

/* ---- social modals: friends + groups ---------------------------------- */
function refreshSocial(){ if(state.tab==='feed'){ render(); bindView(); } }
function friendsBody(){
  const reqs=state.friends.filter(f=>f.status==='request');
  const mates=state.friends.filter(f=>f.status==='friend');
  const sugg=state.friends.filter(f=>f.status==='suggested'||f.status==='pending');
  const row=(f,right)=>`<div class="soc-row">
    <div class="feed-ava" style="width:38px;height:38px;border-radius:11px;font-size:14px;background:${f.color}">${f.init}</div>
    <div style="flex:1;min-width:0"><b style="font-size:13.5px">${f.name}</b><div class="muted" style="font-size:11px;margin-top:1px">${ic.fire} ${f.streak}-day streak</div></div>
    ${right}</div>`;
  let html='';
  if(reqs.length){ html+=`<div class="eyebrow" style="margin:2px 0 8px">Friend requests</div>`+
    reqs.map(f=>row(f,`<div style="display:flex;gap:7px"><button class="btn primary" style="padding:7px 12px" onclick="acceptFriend('${f.name}')">Accept</button><button class="btn ghost" style="padding:7px 12px" onclick="declineFriend('${f.name}')">Decline</button></div>`)).join(''); }
  html+=`<div class="eyebrow" style="margin:${reqs.length?'18px':'2px'} 0 8px">Your friends · ${mates.length}</div>`+
    (mates.length?mates.map(f=>row(f,`<span class="tag teal">${f.pts} pts</span>`)).join(''):`<div class="rx-empty">No friends yet — add a few below.</div>`);

      : `<button class="btn primary" style="padding:7px 13px" onclick="addFriend('${f.name}')">${ic.plus} Add</button>`)).join(''); }
  return html;
}

function joinGroup(id){ const g=state.groups.find(x=>x.id===id); if(g){ g.joined=true; g.members++; } const b=document.getElementById('groupsBody'); if(b)b.innerHTML=groupsBody(); refreshSocial(); toast('Joined '+(g?g.name:'group'),ic.check); }

function repHistory(){
  const fc={Strong:'var(--teal-deep)',Good:'var(--teal-deep)',OK:'var(--muted)',Tough:'#b9760a',Painful:'var(--rose)'};
  return state.reports.map(x=>`<div style="padding:12px 0;border-bottom:1px solid var(--line-soft)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <b style="font-size:12.5px">${x.when}</b>
      <span style="font-weight:800;font-size:11px;color:${fc[x.feel]||'var(--muted)'}">${x.feel}</span>

function updRange(key,val){
  state.report[key]=+val;
  const el=document.getElementById(key==='pain'?'painVal':'soreVal');
  if(el) el.textContent=val+' · '+feelWord(+val);
  if(key==='pain'){ const s=document.getElementById('painSafety'); if(s) s.style.display = +val>=8 ? 'flex' : 'none'; }
}
function setFeel(f){
  state.report.feel=f;
  document.querySelectorAll('#feelChips .chip').forEach(c=>
    c.classList.toggle('on', c.textContent.trim().toLowerCase().endsWith(f.toLowerCase())));
}
function saveReport(){
  const r=state.report;
  const feel=r.feel?(r.feel[0].toUpperCase()+r.feel.slice(1)):'OK';
  state.reports.unshift({when:'Just now', pain:r.pain, soreness:r.soreness, feel, note:r.note||''});
  // close the loop → surface this in the physio's view of the patient (patient = PATIENTS[0])
  const p=PATIENTS[0];
  p.pain=r.pain;
  const flare = r.pain>=5 || r.soreness>=7;
  p.flare = flare ? {pain:r.pain, soreness:r.soreness, feel, note:r.note||'', when:'Just now'} : null;
  p.status = flare ? 'warning' : 'active';
  const highPain = r.pain>=8;
  state.report={pain:2,soreness:3,feel:'good',note:''};
  state.lastWorkout=null;          // banner is one-shot after the workout
  saveSnapshot();
  render();
  if(highPain) toast('Logged — Dr. Miller has been alerted about your pain',ic.alert);
  else if(flare) toast('Check-in sent — flagged for Dr. Miller to review',ic.check);
  else toast('Check-in sent to Dr. Miller',ic.check);
}

function _limb(rest,peak,dur,w,col){ return `<path d="${_lp(rest)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round">${_anim(_vals(rest,peak),dur)}</path>`; }

  return `<path d="${_lp(r)}" fill="none" stroke="#17171c" stroke-width="15" stroke-linecap="round">${_anim(_vals(r,p),dur)}</path>`; }
function _dot(pr,pp,w,col,dur){ const r=[pr[0],pr[1],pr[0],pr[1]], p=[pp[0],pp[1],pp[0],pp[1]];
  return `<path d="${_lp(r)}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round">${_anim(_vals(r,p),dur)}</path>`; }
/* side-view hair: an arc hugging the top + back of the head, so it reads as
   a hairstyle instead of a dark blob. rest/peak are the HEAD centre so the
   hair tracks the head; w is the head diameter. */
function _arcPts(cx,cy,r,d0,d1,n){ const p=[]; for(let i=0;i<=n;i++){ const a=(d0+(d1-d0)*i/n)*Math.PI/180; p.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]); } return p; }
function _ptsPath(p){ return 'M '+p.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' L '); }
function _hairCap(cx,cy,r){ return _ptsPath(_arcPts(cx,cy,r,150,345,9)); }
function _hair(rest,peak,w,col,dur){ const r=w/2; const dR=_hairCap(rest[0],rest[1],r), dP=_hairCap(peak[0],peak[1],r);
  return `<path d="${dR}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">${_anim(`${dR};${dP};${dR}`,dur)}</path>`; }
function _band(rest,peak,dur){ const o=3;

function sideSVG(c){ const d=c.dur;
  return `<svg viewBox="0 0 280 300" class="tut-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <line x1="18" y1="214" x2="262" y2="214" stroke="#d4dbf0" stroke-width="4" stroke-linecap="round"/>
    ${c.parts.map(pt=> pt.kind==='hair' ? _hair(pt.rest,pt.peak,pt.w,pt.col,d) : pt.kind==='dot' ? _dot(pt.rest,pt.peak,pt.w,pt.col,d) : _limb(pt.rest,pt.peak,d,pt.w,pt.col)).join('')}
  </svg>`;
}
function tutorialSVG(name){
  const c=TUT[name]; if(!c) return '';
  if(c.type==='side') return sideSVG(c);
  const d=c.dur;
  return `<svg viewBox="0 0 280 300" class="tut-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    ${tutBody()}
    ${_limb(c.L.u[0],c.L.u[1],d,13,'#e8b48f')}
    ${_limb(c.R.u[0],c.R.u[1],d,13,'#e8b48f')}
    ${_limb(c.L.f[0],c.L.f[1],d,12,'#eeba94')}
    ${_limb(c.R.f[0],c.R.f[1],d,12,'#eeba94')}
    ${_band(c.band[0],c.band[1],d)}
    ${_wrist([c.L.f[0][2],c.L.f[0][3]],[c.L.f[1][2],c.L.f[1][3]],d)}
    ${_wrist([c.R.f[0][2],c.R.f[0][3]],[c.R.f[1][2],c.R.f[1][3]],d)}
  </svg>`;
}

      <svg width="${sz}" height="${sz}">

  const p=state.feed.find(x=>x.id===id); if(!p)return;

  const b=document.getElementById('like-'+id), c=document.getElementById('likec-'+id);

  if(p.liked&&!p.you) toast('You cheered on '+p.name.split(' ')[0]+'!',ic.heart);

function toggleCommentBox(id){
  const box=document.getElementById('cbox-'+id); if(!box)return;

  const i=document.getElementById('cin-'+id); if(!i||!i.value.trim())return;
  const p=state.feed.find(x=>x.id===id); p.comments.push({who:'You',text:i.value.trim()}); i.value='';
  document.getElementById('cmts-'+id).innerHTML=commentsHTML(p);
  const c=document.getElementById('cmtc-'+id); if(c)c.textContent=p.comments.length;
  toast('Comment posted',ic.comment);
}

/* ============================================================
   THE GAME ENGINE  (canvas)
   ============================================================ */
let G=null;
function stopGame(){ if(G){ G.running=false; cancelAnimationFrame(G.raf); window.removeEventListener('keydown',G.kd); window.removeEventListener('keyup',G.ku); G=null; } }

function initGame(){
  const cv=document.getElementById('game'); if(!cv) return;
  const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const W=cv.width, H=cv.height;

  // reset today's progress for a clean play
  state.exercises.forEach(e=>e.done=0);

  G = {
    running:true, raf:0, t:0,
    started:false, finished:false,
    encounter:0,
    stretch:0,         // 0..1 current ROM input
    target:0,          // smoothed
    held:false,
    reachedTop:false, repPeak:0,  // armed when entered top zone
    sessionXp:0, sessionReps:0, lastQuality:'—', peakRom:0,
    shake:0, hitFlash:0, slash:0, dmgPops:[], coins:[],
    enemyHurt:0, victory:0, knightSwing:0,
  };

  const enemies={
    slime:{name:'Cave Slime', col:'#6ee06e', dark:'#3fae3f'},
    bat:{name:'Shadow Bat', col:'#9b7ce0', dark:'#6d5ce0'},
    ogre:{name:'Dungeon Ogre', col:'#7fc24a', dark:'#4f8a25'},
  };

  function curEx(){ return state.exercises[G.encounter]; }
  function enemyMaxHP(){ return curEx().reps; }
  function enemyHP(){ return curEx().reps - curEx().done; }

  function renderEnc(){
    const el=document.getElementById('encList'); if(!el)return;
    el.innerHTML = state.exercises.map((e,i)=>{
      const cls = e.done>=e.reps?'done':i===G.encounter?'cur':'';
      const em = {slime:'🟢',bat:'🦇',ogre:'👹'}[e.enemy];
      return `<div class="enc ${cls}"><div class="ec" style="background:rgba(255,255,255,.08)">${e.done>=e.reps?'✅':em}</div>
        <div class="et"><div class="n">${e.name}</div><div class="r">${e.done}/${e.reps} reps</div></div></div>`;
    }).join('');
  }
  renderEnc();
  function syncStats(){
    const set=(id,v)=>{const n=document.getElementById(id); if(n)n.textContent=v;};
    set('sRep',curEx().done); set('sQual',G.lastQuality); set('sRom',Math.round(G.peakRom)+'°'); set('sXp',G.sessionXp);
    set('heroReps',G.sessionReps);
  }
  syncStats();

  // ---- input ----
  const setHeld=(v)=>{ G.held=v; const b=document.getElementById('stretchBtn'); if(b)b.classList.toggle('held',v); };
  G.kd=e=>{ if(e.code==='Space'){e.preventDefault(); if(!G.started)startQuest(); setHeld(true);} };
  G.ku=e=>{ if(e.code==='Space'){e.preventDefault(); setHeld(false);} };
  window.addEventListener('keydown',G.kd); window.addEventListener('keyup',G.ku);
  const sb=document.getElementById('stretchBtn');
  const down=e=>{e.preventDefault(); if(!G.started)startQuest(); setHeld(true);};
  const up=e=>{e.preventDefault(); setHeld(false);};
  sb.addEventListener('pointerdown',down); sb.addEventListener('pointerup',up);
  sb.addEventListener('pointerleave',up); sb.addEventListener('pointercancel',up);

  const overlay=document.getElementById('overlay');
  const ovBtn=document.getElementById('ovBtn');
  function startQuest(){
    G.started=true; overlay.classList.add('hide');
    try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); }catch(e){}
  }
  ovBtn.onclick=startQuest;

  // ---- rep detection + audio ----
  let actx;
  function beep(freq,dur=0.08,type='square',vol=0.06){
    try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(),g=actx.createGain(); o.type=type;o.frequency.value=freq;
      o.connect(g);g.connect(actx.destination); g.gain.value=vol;
      o.start(); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur); o.stop(actx.currentTime+dur);
    }catch(e){}
  }

  function registerRep(quality){
    const ex=curEx();
    if(ex.done>=ex.reps) return;
    ex.done++; G.sessionReps++;
    const gain = quality==='PERFECT'?12:8;
    G.sessionXp += gain;
    G.lastQuality=quality;
    addXp(gain);
    G.enemyHurt=1; G.shake=8; G.hitFlash=1; G.slash=1; G.knightSwing=1;
    G.dmgPops.push({x:560,y:200,t:1,txt:'-1',q:quality});
    beep(quality==='PERFECT'?880:660,0.07,'square',0.05);
    renderEnc(); syncStats();
    if(ex.done>=ex.reps){ defeatEnemy(); }
  }
  function defeatEnemy(){
    G.victory=1; beep(523,0.1);setTimeout(()=>beep(659,0.1),90);setTimeout(()=>beep(784,0.16),180);
    // coins
    for(let i=0;i<14;i++) G.coins.push({x:560,y:200,vx:(Math.random()-0.5)*7,vy:-Math.random()*7-3,t:1});
    setTimeout(()=>{
      if(G.encounter < state.exercises.length-1){
        G.encounter++; G.reachedTop=false; G.lastQuality='—'; renderEnc(); syncStats();
        G.victory=0;
      } else { finish(); }
    },1300);
  }
  function finish(){
    G.finished=true; G.victory=0;
    document.getElementById('ovTitle').textContent='DUNGEON CLEARED!';
    document.getElementById('ovText').innerHTML=`You cleared all 3 encounters — <b>${G.sessionReps} clean reps</b>, earning <b>${G.sessionXp} XP</b>. Your physio can see this session instantly. Next, log how it felt so Dr. Miller can fine-tune your program. 🚪✨`;
    ovBtn.textContent='LOG HOW IT FELT'; ovBtn.classList.add('violet');
    ovBtn.onclick=()=>go('report');
    overlay.classList.remove('hide');
    toast('Session complete · '+G.sessionXp+' XP synced to your physio',ic.trophy);
  }
  function addXp(n){
    state.player.xp+=n;
    while(state.player.xp>=state.player.xpMax){ state.player.xp-=state.player.xpMax; state.player.level++; state.player.xpMax+=80; toast('LEVEL UP! Now level '+state.player.level,ic.shield); }
    const f=document.getElementById('xpFill'), l=document.getElementById('xpLabel');
    if(f)f.style.width=(state.player.xp/state.player.xpMax*100)+'%';
    if(l)l.textContent=state.player.xp+' / '+state.player.xpMax;
  }

  // ---- pixel drawing helpers ----
  const px=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);};
  function drawKnight(x,y,swing){
    const s=4; // pixel scale
    const sway=Math.sin(G.t*0.06)*2;
    y+=sway;
    // body (blue tunic)
    px(x-14,y-6,28,34,'#3b6fd1'); px(x-14,y-6,28,8,'#5a8ae8');
    // belt
    px(x-14,y+18,28,5,'#8a5a2b');
    // legs
    px(x-12,y+28,9,16,'#cfd4dd'); px(x+3,y+28,9,16,'#cfd4dd');
    px(x-13,y+42,11,5,'#6b4a2a'); px(x+2,y+42,11,5,'#6b4a2a');
    // head + helmet
    px(x-12,y-30,24,26,'#c2c7d2'); px(x-12,y-30,24,7,'#a9aec0');
    px(x-8,y-18,16,9,'#f2c9a0'); // face slit
    // arm + sword (swing)
    const sw = swing>0? -Math.sin((1-swing)*Math.PI)*18 : 0;
    ctx.save(); ctx.translate(x+14,y+2); ctx.rotate((-0.5+sw*0.02));
    px(0,-4,8,10,'#f2c9a0'); // hand/arm
    px(6,-30,5,32,'#d8dbe4'); px(6,-30,5,6,'#b4b8c6'); // blade
    px(3,-2,11,4,'#8a5a2b'); // hilt
    ctx.restore();
    // shield
    px(x-26,y-2,12,18,'#c9402f'); px(x-24,y,8,14,'#e76a59'); px(x-21,y+4,2,6,'#fff');
  }
  function drawEnemy(ex,x,y,hurt,vic){
    const e=enemies[ex.enemy];
    const dead=ex.done>=ex.reps;
    if(dead && vic<=0) return;
    const bob=Math.sin(G.t*0.05)*4;
    y+=bob;
    ctx.save();
    if(hurt>0){ ctx.translate(Math.sin(hurt*40)*5,0); }
    if(vic>0){ ctx.globalAlpha=vic; ctx.translate(0,(1-vic)*30); }
    const tint = hurt>0.4 ? '#ffffff' : e.col;
    if(ex.enemy==='slime'){
      px(x-30,y-2,60,34,tint); px(x-30,y+18,60,14,e.dark);
      px(x-30,y-2,60,8,'#bfffbf'); // shine
      px(x-16,y+8,8,8,'#222'); px(x+8,y+8,8,8,'#222'); // eyes
      px(x-8,y+22,16,4,'#1a5e1a');
    } else if(ex.enemy==='bat'){
      px(x-12,y,24,22,tint); px(x-12,y,24,7,'#c9b9f5');
      px(x-34,y-6,22,16,e.dark); px(x+12,y-6,22,16,e.dark); // wings
      px(x-8,y+6,7,7,'#ffd34d'); px(x+1,y+6,7,7,'#ffd34d'); // eyes
      px(x-9,y-7,5,8,e.dark); px(x+4,y-7,5,8,e.dark); // ears
    } else { // ogre
      px(x-26,y-30,52,60,tint); px(x-26,y-30,52,10,'#9fd06a');
      px(x-32,y-6,12,30,tint); px(x+20,y-6,12,30,tint); // arms
      px(x-16,y-18,10,9,'#222'); px(x+6,y-18,10,9,'#222'); // eyes
      px(x-10,y+2,20,4,'#2c4a16'); // mouth
      px(x-8,y-4,4,7,'#fff'); px(x+4,y-4,4,7,'#fff'); // tusks
      // club
      px(x+34,y-34,9,40,'#7a4a22'); px(x+30,y-40,18,14,'#6b3f1d');
    }
    ctx.restore();
  }
  function drawHearts(x,y,hp,max){
    for(let i=0;i<max;i++){
      const hx=x+i*16;
      ctx.fillStyle = i<hp ? '#ff4d6d' : 'rgba(255,255,255,.18)';
      // tiny pixel heart
      ctx.fillRect(hx,y+2,4,4);ctx.fillRect(hx+6,y+2,4,4);
      ctx.fillRect(hx,y+5,10,4);ctx.fillRect(hx+2,y+9,6,3);ctx.fillRect(hx+4,y+11,2,2);
    }
  }

  // ---- main loop ----
  function loop(){
    if(!G||!G.running)return;
    G.t++;
    // smooth stretch toward held target
    const goal = G.held?1:0;
    G.stretch += (goal-G.stretch)*0.18;
    if(G.stretch<0.001)G.stretch=0;
    const romDeg = Math.round(G.stretch*120); // 0..120°
    if(G.started && !G.finished){
      const target = curEx().rom;          // required ROM (deg)
      const tz = target/120;               // threshold in 0..1
      if(romDeg>G.peakRom) G.peakRom=romDeg;
      // entering the glowing target zone arms the rep + tracks how deep they went
      if(G.stretch>=tz){ G.reachedTop=true; if(G.stretch>G.repPeak) G.repPeak=G.stretch; }
      // returning to rest after reaching the zone = one clean, counted rep
      if(G.reachedTop && G.stretch<0.12){
        const quality = G.repPeak >= tz*1.04 ? 'PERFECT' : 'GOOD';
        registerRep(quality);
        G.reachedTop=false; G.repPeak=0;
      }
    }
    // decay effects
    G.shake*=0.85; G.hitFlash*=0.86; G.slash*=0.88; G.enemyHurt*=0.88; G.knightSwing*=0.85;
    if(G.victory>0) G.victory=Math.min(1,G.victory+0.04);

    draw(romDeg);
    G.raf=requestAnimationFrame(loop);
  }

  function draw(romDeg){
    const shx=(Math.random()-0.5)*G.shake, shy=(Math.random()-0.5)*G.shake;
    ctx.save(); ctx.translate(shx,shy);

    // ----- dungeon background -----
    // floor
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2a2350'); g.addColorStop(1,'#16122f'); ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    // back wall bricks
    ctx.fillStyle='#241d44';
    for(let r=0;r<3;r++)for(let c=0;c<10;c++){ ctx.fillStyle=(r+c)%2?'#241d44':'#2c2452'; ctx.fillRect(c*84-10,r*60+10,80,56); }
    // floor sand
    ctx.fillStyle='#c9a06b'; ctx.fillRect(-20,330,W+40,H);
    ctx.fillStyle='#b88c54';
    for(let i=0;i<10;i++) ctx.fillRect(i*90-20,330,80,8);
    // torches glow
    const glow=ctx.createRadialGradient(120,120,10,120,120,160); glow.addColorStop(0,'rgba(255,170,60,.35)');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow; ctx.fillRect(0,0,300,300);
    const glow2=ctx.createRadialGradient(680,120,10,680,120,160); glow2.addColorStop(0,'rgba(255,170,60,.3)');glow2.addColorStop(1,'transparent');
    ctx.fillStyle=glow2; ctx.fillRect(440,0,360,300);

    // ----- ROM meter (top) -----
    const ex=curEx();
    const mx=70,my=34,mw=W-140,mh=26;
    ctx.fillStyle='rgba(0,0,0,.35)'; roundRect(mx-6,my-6,mw+12,mh+12,8); ctx.fill();
    ctx.fillStyle='#0c0a1f'; roundRect(mx,my,mw,mh,6); ctx.fill();
    // target zone
    const tz = ex.rom/120;
    ctx.fillStyle='rgba(22,196,172,.25)';
    ctx.fillRect(mx+mw*tz, my, mw*(1-tz), mh);
    // glowing target line
    const pulse=0.5+0.5*Math.sin(G.t*0.12);
    ctx.fillStyle=`rgba(22,196,172,${0.6+0.4*pulse})`;
    ctx.fillRect(mx+mw*tz-2, my-4, 4, mh+8);
    // fill
    const fillC = G.stretch>=tz ? '#16c4ac' : '#f5a623';
    ctx.fillStyle=fillC; roundRect(mx,my,Math.max(2,mw*G.stretch),mh,6); ctx.fill();
    // marker
    ctx.fillStyle='#fff'; ctx.fillRect(mx+mw*G.stretch-2,my-3,4,mh+6);
    // labels
    ctx.font="10px 'Press Start 2P'"; ctx.fillStyle='#cfc9ef'; ctx.textAlign='left';
    ctx.fillText('RANGE OF MOTION',mx,my-12);
    ctx.textAlign='right'; ctx.fillStyle=fillC; ctx.fillText(romDeg+'°',mx+mw,my-12);
    ctx.textAlign='center'; ctx.fillStyle='rgba(22,196,172,.9)'; ctx.font="8px 'Press Start 2P'";
    ctx.fillText('TARGET '+ex.rom+'°', mx+mw*tz+mw*(1-tz)/2, my+mh+16);

    // ----- band + wristbands (bottom-left visual) -----
    drawBand(140, 430, G.stretch);

    // ----- characters -----
    drawKnight(220, 290, G.knightSwing);
    drawEnemy(ex, 580, 250, G.enemyHurt, G.victory);

    // enemy hearts
    if(ex.done<ex.reps || G.victory>0){
      ctx.textAlign='center';
      drawHearts(580-(Math.min(ex.reps,10)*16)/2, 180, enemyHP(), Math.min(ex.reps,10));
      if(ex.reps>10){ ctx.font="9px 'Press Start 2P'"; ctx.fillStyle='#fff'; ctx.fillText('x'+ex.reps,580+ (Math.min(ex.reps,10)*16)/2+18,190);}
      ctx.font="9px 'Press Start 2P'"; ctx.fillStyle='#fff';
      ctx.fillText(enemies[ex.enemy].name.toUpperCase(),580,150);
    }

    // ----- slash effect -----
    if(G.slash>0){
      ctx.strokeStyle=`rgba(255,255,255,${G.slash})`; ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(560,210,60,-0.6+ (1-G.slash),1.4+(1-G.slash)); ctx.stroke();
    }
    // hit flash
    if(G.hitFlash>0.02){ ctx.fillStyle=`rgba(255,80,110,${G.hitFlash*0.25})`; ctx.fillRect(-20,-20,W+40,H+40); }

    // ----- coins -----
    G.coins=G.coins.filter(c=>c.t>0);
    G.coins.forEach(c=>{ c.x+=c.vx;c.y+=c.vy;c.vy+=0.4;c.t-=0.02;
      ctx.fillStyle='#ffd34d'; ctx.fillRect(c.x,c.y,8,8); ctx.fillStyle='#b9870f'; ctx.fillRect(c.x+2,c.y+2,2,4); });

    // ----- damage pops -----
    G.dmgPops=G.dmgPops.filter(d=>d.t>0);
    G.dmgPops.forEach(d=>{ d.t-=0.02; d.y-=1.4;
      ctx.font="14px 'Press Start 2P'"; ctx.textAlign='center';
      ctx.fillStyle=d.q==='PERFECT'?`rgba(22,196,172,${d.t})`:`rgba(255,255,255,${d.t})`;
      ctx.fillText(d.q==='PERFECT'?'PERFECT!':'HIT!',d.x,d.y-18);
    });

    // ----- bottom hint banner -----
    ctx.fillStyle='rgba(0,0,0,.55)'; roundRect(W/2-200,H-46,400,32,8); ctx.fill();
    ctx.font="9px 'Press Start 2P'"; ctx.textAlign='center'; ctx.fillStyle='#fff';
    let msg = !G.started ? 'PRESS START' : G.finished ? 'DUNGEON CLEARED!' :
      (G.stretch>=tz ? 'NOW RETURN TO COUNT THE REP!' : G.reachedTop ? 'RETURN ALL THE WAY DOWN' : 'STRETCH TO THE GLOWING ZONE');
    ctx.fillStyle = G.stretch>=tz?'#16c4ac':'#ffd86b';
    ctx.fillText(msg, W/2, H-25);

    ctx.restore();
  }

  function drawBand(cx,cy,s){
    // two wristbands pulled apart by stretch
    const spread = 26 + s*64;
    // band (elastic)
    ctx.strokeStyle='#e8b84d'; ctx.lineWidth=6+s*3;
    ctx.beginPath(); ctx.moveTo(cx-spread,cy); ctx.quadraticCurveTo(cx,cy+18-s*10,cx+spread,cy); ctx.stroke();
    // wristbands (teal pods)
    [-1,1].forEach(d=>{ const x=cx+d*spread;
      ctx.fillStyle='#15a892'; roundRect(x-12,cy-12,24,24,6); ctx.fill();
      ctx.fillStyle='#1de0c4'; ctx.fillRect(x-6,cy-6,12,12);
      ctx.fillStyle='#fff'; ctx.fillRect(x-2,cy-2,4,4);
    });
    ctx.font="7px 'Press Start 2P'"; ctx.fillStyle='#aaa6cf'; ctx.textAlign='center';
    ctx.fillText('RESISTANCE BAND',cx,cy+34);
  }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  loop();
}

/* ---- prescription management (per patient) ---------------------------- */
function refreshRx(){
  const p=curPatient();
  const rl=document.getElementById('rxList'); if(rl) rl.innerHTML=rxList();
  const ab=document.getElementById('adjustBody'); if(ab) ab.innerHTML=adjustBody(p);
  const lb=document.getElementById('libBody'); if(lb) lb.innerHTML=libBody(p);
}
function addRx(pid,key){
  const p=PATIENTS.find(x=>x.id===pid); if(!p.rx) p.rx=[];
  if(p.rx.some(r=>r.key===key)) return;
  const e=libEx(key);
  p.rx.push({key,sets:3,reps:12,freq:3});
  refreshRx(); toast('Added '+(e.name||key),ic.check);
}
function removeRx(pid,key){
  const p=PATIENTS.find(x=>x.id===pid); const e=libEx(key);
  p.rx=(p.rx||[]).filter(r=>r.key!==key);
  refreshRx(); toast('Removed '+(e.name||key));
}
function setRx(pid,key,field,val){
  const p=PATIENTS.find(x=>x.id===pid); const r=(p.rx||[]).find(x=>x.key===key); if(!r) return;
  r[field]=+val;
  const span=document.getElementById((field==='reps'?'repsv-':'freqv-')+key);
  if(span) span.textContent = field==='reps' ? r.reps : r.freq+'×/week';
  const rl=document.getElementById('rxList'); if(rl) rl.innerHTML=rxList();
}

/* ============================================================
   tiny SVG area chart
   ============================================================ */
function areaChart(data,id){
  const W=560,H=170,pad=8;
  const max=Math.max(...data,100), min=Math.min(...data,0);
  const xs=i=>pad+i*(W-pad*2)/(data.length-1);
  const ys=v=>H-18-(v-min)/(max-min)*(H-40);
  const pts=data.map((v,i)=>[xs(i),ys(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
  const area=line+` L${xs(data.length-1)} ${H-18} L${pad} ${H-18} Z`;
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:170px;overflow:visible">
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--teal)" stop-opacity=".22"/><stop offset="1" stop-color="var(--teal)" stop-opacity="0"/></linearGradient></defs>
    ${[0,1,2,3].map(i=>`<line x1="${pad}" y1="${18+i*38}" x2="${W-pad}" y2="${18+i*38}" stroke="var(--line-soft)" stroke-dasharray="3 4"/>`).join('')}
    <path d="${area}" fill="url(#g${id})"/>
    <path d="${line}" fill="none" stroke="var(--teal)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#fff" stroke="var(--teal)" stroke-width="2"/>`).join('')}
    ${data.map((v,i)=>`<text x="${xs(i)}" y="${H-2}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--muted)" font-family="Plus Jakarta Sans">${days[i]}</text>`).join('')}
  </svg>`;
}

let _calTimer=null;
function calibrateBands(){
  const btn=document.getElementById('calBtn'), wrap=document.getElementById('calBarWrap'),
        bar=document.getElementById('calBar'), status=document.getElementById('calStatus');
  if(!btn||_calTimer) return;
  btn.disabled=true; btn.style.opacity=.6; wrap.style.display='block';
  if(status) status.innerHTML=`${ic.activity} Reach full range…`;
  let p=0;
  _calTimer=setInterval(()=>{
    const b=document.getElementById('calBar'); if(!b){ clearInterval(_calTimer); _calTimer=null; return; }
    p+=4; b.style.width=Math.min(p,100)+'%';
    if(p>=100){
      clearInterval(_calTimer); _calTimer=null;
      const rom=92+Math.floor(Math.random()*7);   // 92–98°
      const romEl=document.getElementById('calRom'); if(romEl) romEl.textContent=rom+'°';
      const heroBest=document.querySelectorAll('.gp-hero-stats .hv')[2]; if(heroBest) heroBest.textContent=rom+'°';
      const s=document.getElementById('calStatus'); if(s) s.innerHTML=`${ic.check} Calibrated just now`;
      const w=document.getElementById('calBarWrap'); if(w) setTimeout(()=>{ if(w) w.style.display='none'; },500);
      const bt=document.getElementById('calBtn'); if(bt){ bt.disabled=false; bt.style.opacity=1; }
      toast('Bands calibrated · max ROM '+rom+'°',ic.check);
    }
  },55);
}

/* ============================================================
   SCHEDULE  (rest days are part of the plan) — embedded, no dedicated page
   ============================================================ */
const TRAIN_DOW=[1,2,4,5,6]; // Mon Tue Thu Fri Sat = training; Wed + Sun = rest
const DOW_LABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dayState(date, today){
  const dow=date.getDay(); const train=TRAIN_DOW.includes(dow);
  const dDay=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const tDay=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  if(dDay.getTime()===tDay.getTime()) return train?'today-train':'today-rest';
  if(!train) return 'rest';
  return dDay<tDay ? 'done' : 'upcoming';
}
function schedWeek(today){
  const wkStart=new Date(today); wkStart.setDate(today.getDate()-((today.getDay()+6)%7));
  const arr=[]; for(let i=0;i<7;i++){ const d=new Date(wkStart); d.setDate(wkStart.getDate()+i); arr.push({date:d, st:dayState(d,today)}); }
  return arr;
}
function weekSummary(today){
  let train=0,done=0,rest=0; schedWeek(today).forEach(x=>{ (x.st==='rest'||x.st==='today-rest')?rest++:train++; if(x.st==='done')done++; });
  return {train,done,rest};
}
// trailing-7-day adherence breakdown for the clinician view.
// The percentage is derived FROM the integer session counts, so the
// headline % always equals done/scheduled (no rounding mismatch).
function adherence7(today, adh){
  const wk=[]; for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i); wk.push(dayState(d,today)); }
  const scheduled=wk.filter(s=>s==='done').length;
  const miss=(scheduled===0||adh==null)?0:Math.round((100-Math.min(adh,100))/100*scheduled);
  const done=scheduled-miss;
  const pct=scheduled===0?100:Math.round(done/scheduled*100);
  return {scheduled, done, miss, pct};
}
// compact 7-day strip; adh (optional) marks oldest training days as missed for lower adherence
function weekStripHTML(today, adh, trailing){
  let wk;
  if(trailing){ wk=[]; for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i); wk.push({date:d, st:dayState(d,today)}); } }
  else wk=schedWeek(today);
  const past=wk.filter(x=>x.st==='done');
  const miss=adh==null?0:Math.round((100-Math.min(adh,100))/100*past.length);
  const missSet=new Set(past.slice(0,miss).map(x=>x.date.toDateString()));
  const fixed=['M','T','W','T','F','S','S'], di=['S','M','T','W','T','F','S'];
  return `<div class="wk-strip">${wk.map((x,i)=>{
    let cls;
    if(x.st==='done') cls=missSet.has(x.date.toDateString())?'miss':'done';
    else if(x.st==='rest'||x.st==='today-rest') cls='rest';
    else cls='up';
    const tnow=x.st.startsWith('today');
    const lab=trailing?di[x.date.getDay()]:fixed[i];
    return `<div class="wk-day"><span class="wk-l">${lab}</span><div class="wk-pill ${cls} ${tnow?'tnow':''}">${cls==='done'?ic.check:cls==='miss'?'✕':''}</div></div>`;
  }).join('')}</div>`;
}
function monthHTML(today){
  const y=today.getFullYear(), m=today.getMonth();
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  let cells=''; for(let i=0;i<first;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1; d<=days; d++){ const dt=new Date(y,m,d); const st=dayState(dt,today);
    const cls = st==='done'?'done':st==='rest'?'rest':st==='upcoming'?'upcoming':st==='today-rest'?'rest today':'upcoming today';
    const mark = st==='done'?`<span class="cmark" style="color:var(--teal-deep)">${ic.check}</span>`
      : (st==='rest'||st==='today-rest')?`<span class="cmark" style="color:var(--muted);font-size:13px">·</span>`
      : `<span class="cmark" style="color:var(--violet)">${ic.bolt}</span>`;
    cells+=`<div class="cell ${cls}"><div class="dn">${d}</div>${mark}</div>`;
  }
  return {monthName: today.toLocaleDateString('en-GB',{month:'long',year:'numeric'}), cells};
}
function openSchedule(){
  const today=new Date(); const mh=monthHTML(today); const s=weekSummary(today);
  modalShell('schedModal', modalHead('Your schedule','Rehab isn\'t every day — rest is built in, and taking it is part of doing the program right','schedModal')+
    `<div class="modal-body">

      <div class="cal-head">${DOW_LABELS.map(d=>`<span>${d[0]}</span>`).join('')}</div>

        <span><i class="lg-sw" style="background:#f3f1fe;border-color:#dcd6fb"></i>Scheduled</span>

/* ============================================================
   PROGRESS RECORDING (opt-in, this device only)
   Off by default. When on, the user's progress (level, check-ins,
   messages, last workout) is saved to localStorage and merged back
   over the seeded demo data on the next refresh.
   ============================================================ */
const STORE_KEY='request_save_v1', FLAG_KEY='request_record_v1';
function recEnabled(){ try{ return localStorage.getItem(FLAG_KEY)==='1'; }catch(e){ return false; } }
function loadSnapshot(){ try{ const s=localStorage.getItem(STORE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function clearSnapshot(){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} }
function saveSnapshot(){
  if(!state.recording) return;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({
    player:state.player, reports:state.reports, threads:state.threads,
    lastWorkout:state.lastWorkout||null, ts:Date.now()
  })); }catch(e){}
}
function restoreIfRecording(){
  state.recording = recEnabled();
  if(!state.recording) return;
  const s=loadSnapshot(); if(!s) return;
  if(s.player) Object.assign(state.player, s.player);          // level, xp, streak, workouts
  if(Array.isArray(s.reports)) state.reports = s.reports;       // check-in history
  if(s.threads) state.threads = {...state.threads, ...s.threads}; // messages
  if(s.lastWorkout) state.lastWorkout = s.lastWorkout;
}
function toggleRecording(){
  state.recording=!state.recording;
  try{ localStorage.setItem(FLAG_KEY, state.recording?'1':'0'); }catch(e){}
  if(state.recording){ saveSnapshot(); toast('Recording on \u2014 your progress is saved on this device',ic.check); }
  else{ clearSnapshot(); toast('Recording off \u2014 saved progress cleared'); }
  const b=document.getElementById('settingsBody'); if(b) b.innerHTML=settingsBody();
}
window.toggleRecording=toggleRecording;

/* ============================================================
   REQUEST GAME LINK  — launches the ReQuest Dungeon from the page
   (native window, or mirrored live into the Crystal Caverns screen)

const BRIDGE = { http:'http://127.0.0.1:8765', ws:null, online:false,
                 status:{configured:false,running:false,mirror:false,game:null},
                 frames:false, frameURL:null, retryT:null };

function bridgeUI(){
  const scr=document.getElementById('gameScreen'); if(!scr) return;

                   '<button class="pixbtn violet" onclick="bridgeLaunch(true)">LAUNCH + MIRROR</button>';
    hint.innerHTML='Set your reps & sets below and press send \u2014 they\u2019re applied to the session instantly.';
  }else if(st.mirror&&!BRIDGE.frames){
    t.textContent='STARTING\u2026';
    p.textContent='Your session is loading \u2014 the dungeon appears in a moment.';

  }
